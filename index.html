<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ever Gain Plaza shuttle bus next departure (Hong Kong time)">
  <title>Ever Gain Plaza Shuttle - Next Bus</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <p class="eyebrow">Ever Gain Plaza Shuttle</p>
      <h1>&#27704;&#24471;&#21033;&#24291;&#22580;&#31359;&#26797;&#24052;&#22763;</h1>

    <nav class="route-tabs" role="tablist" aria-label="Shuttle routes">

        &#33906;&#33459; &#8596; &#24291;&#22580;

        &#32654;&#23343; &#8594; &#24291;&#22580;

    <main class="card" aria-live="polite">
      <p class="route-name" id="route-name">--</p>
      <p class="status-badge" id="status-badge">--</p>

      <div class="next-bus" id="next-bus-block">

      <p class="meta">&#26178;&#38291;&#34920;&#36039;&#26009;&#26356;&#26032;&#33267; 2023 &#24180; 10 &#26376; 12 &#26085;</p>
    </footer>
  </div>

  <script src="js/holidays.js"></script>
  <script src="js/timetable.js"></script>
  <script src="js/nextBus.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
