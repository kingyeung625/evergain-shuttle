<head>
  <meta charset="UTF-8">

  <meta property="og:type" content="website">

  <meta name="twitter:description" content="查詢永得利廣場 shuttle bus 穿梭巴士時間表與下一班開出時間。">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "永得利廣場穿梭巴士時間表",
    "alternateName": "Ever Gain Plaza Shuttle Bus",
    "description": "查詢永得利廣場 shuttle bus 穿梭巴士時間表與下一班開出時間",
    "url": "https://kingyeung625.github.io/evergain-shuttle/",
    "applicationCategory": "TravelApplication",
    "operatingSystem": "All",
    "inLanguage": "zh-HK"
  }
  </script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <p class="eyebrow">Ever Gain Plaza Shuttle</p>
      <h1>永得利廣場穿梭巴士</h1>
      <p class="clock" id="hkt-clock" aria-live="polite">--</p>
    </header>

    <nav class="route-tabs" role="tablist" aria-label="穿梭巴士路線">
      <button type="button" class="route-tab active" data-route="kwaiFong" role="tab" aria-selected="true">
        葵芳 ↔ 永得利
      </button>
      <button type="button" class="route-tab" data-route="toMeiFooLaiKing" role="tab" aria-selected="false">
        永得利 → 荔景／美孚
      </button>
      <button type="button" class="route-tab" data-route="fromMeiFoo" role="tab" aria-selected="false">
        美孚 → 永得利
      </button>
    </nav>

    <main class="card" aria-live="polite">
      <p class="route-name" id="route-name">--</p>
      <p class="status-badge" id="status-badge">--</p>

      <div class="next-bus" id="next-bus-block">
        <p class="label">下一班</p>
        <p class="time" id="next-time">--:--</p>
        <p class="countdown" id="countdown"></p>
      </div>

      <p class="detail" id="detail-message"></p>
      <p class="next-service" id="next-service"></p>

      <details class="timetable-accordion" id="timetable-accordion">
        <summary>完整時間表<span class="timetable-summary-hint">含頻密班次時段</span></summary>
        <div class="timetable-panel">
          <nav class="timetable-day-tabs" role="tablist" aria-label="服務日">
            <button type="button" class="timetable-day-tab active" data-day="weekday" role="tab" aria-selected="true">周一至五</button>
            <button type="button" class="timetable-day-tab" data-day="saturday" role="tab" aria-selected="false">周六</button>
            <button type="button" class="timetable-day-tab" data-day="closed" role="tab" aria-selected="false">周日及公眾假期</button>
          </nav>
          <div class="timetable-day-content" id="timetable-day-content"></div>
        </div>
      </details>
    </main>

    <footer class="footer">
      <p>所有班次的開出時間可能因為交通情況及滿座而有所調整。</p>
      <p>Departure times may be adjusted due to traffic conditions and full occupancy.</p>
      <p class="meta">時間表資料更新至 2023 年 10 月 12 日</p>
    </footer>
  </div>

  <script src="js/holidays.js"></script>
  <script src="js/timetable.js"></script>
  <script src="js/nextBus.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
